<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Tickerlens{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  {% block extra_head %}{% endblock %}
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#6366f1',
          }
        }
      }
    }
  </script>
</head>
<body class="h-full text-gray-100 font-sans antialiased">

  <!-- Nav -->
  <nav class="border-b border-gray-800 bg-gray-950">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 flex items-center h-14 gap-6">
      <a href="/" class="text-indigo-400 font-bold tracking-tight text-lg">Tickerlens</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
